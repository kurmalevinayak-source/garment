name: siddhivinayak_garments
description: "Siddhivinayak Garments - Business Management App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.6.0
  cloud_firestore: ^5.6.0

  # State Management
  provider: ^6.1.2

  # UI & Charts
  fl_chart: ^0.70.2
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8

  # PDF generation & printing
  pdf: ^3.11.1
  printing: ^5.13.4

  # Date formatting
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
